kind = "web"
previewPath = "/"
title = "Saathi"
version = "1.0.0"
id = "artifacts/saathi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21756

[services.development]
run = "pnpm --filter @workspace/saathi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/saathi", "run", "build" ]
publicDir = "artifacts/saathi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21756"
BASE_PATH = "/"
